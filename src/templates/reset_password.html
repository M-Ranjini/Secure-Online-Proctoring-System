<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 380px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

{% extends "base.html" %}
{% block title %}Set New Password | {{ project_name }}{% endblock %}

{% block content %}
<div class="login-card">
    <h2>Reset Password</h2>
    <p>Please enter and confirm your new secure password.</p>

    <form method="POST">
        <input type="password" name="password" placeholder="New password" required minlength="8">
        <input type="password" name="confirm_password" placeholder="Confirm new password" required minlength="8">
        
        <button type="submit" class="submit-btn" style="background: #27ae60;">Update Password</button>
    </form>
</div>
{% endblock %}
