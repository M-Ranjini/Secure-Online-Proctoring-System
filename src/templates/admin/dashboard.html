<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SecureExam AI</title>
    <style>
        /* Modern Onyx/Dark Professional Variables */
        :root {
            --bg: #121212;
            --sidebar: #1a1a1a;
            --card-bg: #252525;
            --accent: #007bff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 { padding: 20px; font-size: 1.2rem; color: var(--accent); }
        .sidebar a {
            padding: 15px 20px;
            color: var(--text-dim);
            text-decoration: none;
            transition: 0.3s;
        }
        .sidebar a:hover { background: #333; color: var(--text-main); border-left: 4px solid var(--accent); }

        /* Main Content Styling */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #444;
            text-align: center;
        }

        .card h4 { color: var(--text-dim); text-transform: uppercase; margin: 0 0 10px 0; font-size: 0.8rem; }
        .card div { font-size: 2rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Admin Portal</h2>
        <a href="/admin/dashboard">Overview</a>
        <a href="/admin/upload-qp">Upload Exams</a>
        <a href="/admin/reports">Proctoring Logs</a>
    </div>

    <div class="main-content">
        <header>
            <h1>Dashboard Overview</h1>
            <p>Welcome back, Admin. Here is the current status of your platform.</p>
        </header>

        <div class="stats-grid">
            <div class="card">
                <h4>Total Exams</h4>
                <div>{{ total_exams }}</div>
            </div>
            <div class="card">
                <h4>Registered Students</h4>
                <div>{{ total_students }}</div>
            </div>
            <div class="card">
                <h4>Active Violations</h4>
                <div>{{ total_violations }}</div>
            </div>
        </div>
    </div>
</body>
</html>
