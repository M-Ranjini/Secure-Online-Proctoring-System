<div class="main-content">
    <h1>Proctoring Violations</h1>
    <table class="data-table">
        <thead>
            <tr>
                <th>Student</th>
                <th>Time</th>
                <th>Flag Type</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.student_name }}</td>
                <td>{{ log.timestamp }}</td>
                <td><span class="badge {{ log.flag_type|lower|replace(' ', '-') }}">{{ log.flag_type }}</span></td>
                <td>{{ log.status }}</td>
                <td><button onclick="review('{{ log.id }}')">View</button></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<style>
    .data-table { width: 100%; border-collapse: collapse; background: #1a1a1a; }
    .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
    .badge { padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; }
    .badge.phone { background: #d9534f; } /* Red for critical alerts */
    .badge.eye-move { background: #f0ad4e; } /* Orange for suspicious activity */
</style>
